[llama_wrangler:*]
SHOULD_LINEMERGE = false
KV_MODE = json
INDEXED_EXTRACTIONS = json
TRUNCATE = 200000
TIME_PREFIX = "timestamp"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 30

[llama_wrangler:request]
EVAL-event_category = "request"

[llama_wrangler:response]
EVAL-event_category = "response"

[llama_wrangler:node_health]
EVAL-event_category = "node_health"

[llama_wrangler:routing_decision]
EVAL-event_category = "routing_decision"

[llama_wrangler:consensus]
EVAL-event_category = "consensus"

[llama_wrangler:frontier_delta]
EVAL-event_category = "frontier_delta"

[llama_wrangler:queue_state]
EVAL-event_category = "queue"

[llama_wrangler:upstream_retry]
EVAL-event_category = "streaming_outcome"

[llama_wrangler:response_partial]
EVAL-event_category = "streaming_outcome"

[llama_wrangler:request_cancelled]
EVAL-event_category = "streaming_outcome"

[llama_wrangler:benchmark_job_claimed]
EVAL-event_category = "benchmark_scheduler"

[llama_wrangler:benchmark_job_status]
EVAL-event_category = "benchmark_scheduler"

[llama_wrangler:benchmark_scheduler_reconcile]
EVAL-event_category = "benchmark_scheduler"

[llama_wrangler:benchmark_scheduler_manual_reconcile]
EVAL-event_category = "benchmark_scheduler"

[llama_wrangler:benchmark_scheduler_background_tick]
EVAL-event_category = "benchmark_scheduler"

[llama_wrangler:benchmark_scheduler_policy_updated]
EVAL-event_category = "benchmark_scheduler"

[llama_wrangler:subscriber_benchmark_runner_tick]
EVAL-event_category = "benchmark_runner"

[llama_wrangler:model_lifecycle_action_queued]
EVAL-event_category = "model_lifecycle_action"

[llama_wrangler:model_lifecycle_action_claimed]
EVAL-event_category = "model_lifecycle_action"

[llama_wrangler:model_lifecycle_action_status]
EVAL-event_category = "model_lifecycle_action"

[llama_wrangler:model_lifecycle_action_rejected]
EVAL-event_category = "model_lifecycle_action"
