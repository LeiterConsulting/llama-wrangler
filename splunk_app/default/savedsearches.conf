[Llama Wrangler - Endpoint Health Summary]
search = `llama_wrangler_health` | stats latest(status) as status latest(memory_available_gb) as memory_available_gb latest(active_jobs) as active_jobs latest(max_jobs) as max_jobs by node_id hostname platform arch
cron_schedule = */5 * * * *
disabled = 1

[Llama Wrangler - Model Performance Summary]
search = `llama_wrangler_responses` | stats count avg(latency_ms) as avg_latency_ms avg(tokens_per_second) as avg_tps perc95(latency_ms) as p95_latency_ms by selected_node resolved_model model_alias
cron_schedule = */10 * * * *
disabled = 1

[Llama Wrangler - Frontier Usage Summary]
search = `llama_wrangler_index` sourcetype=llama_wrangler:frontier_delta | stats count sum(estimated_cost_usd) as estimated_cost by provider frontier_model payload_type
cron_schedule = */15 * * * *
disabled = 1

[Llama Wrangler - Consensus Participant Failure Summary]
search = `llama_wrangler_consensus` | stats sum('failure_reason_counts.missing_proxy_url') as missing_proxy_url sum('failure_reason_counts.connection_error') as connection_error sum('failure_reason_counts.upstream_4xx') as upstream_4xx sum('failure_reason_counts.upstream_5xx') as upstream_5xx sum('failure_reason_counts.body_read_failure') as body_read_failure sum('failure_reason_counts.response_size_limit') as response_size_limit sum('failure_reason_counts.timeout') as timeout sum('failure_reason_counts.cancellation') as cancellation
cron_schedule = */10 * * * *
disabled = 1

[Llama Wrangler - Queue Scheduling Summary]
search = `llama_wrangler_queue` | stats count as events max(queue_depth) as peak_queue_depth latest(queue_capacity) as queue_capacity by scheduling_policy priority status | sort - events
cron_schedule = */5 * * * *
disabled = 1

[Llama Wrangler - Streaming Outcome Summary]
search = `llama_wrangler_streaming_outcomes` | stats count as events sum(eval(partial_output=true())) as partial_events by event_type reason retry_phase stream | sort - events
cron_schedule = */10 * * * *
disabled = 1

[Llama Wrangler - Benchmark Scheduler and Runner History]
search = `llama_wrangler_benchmark_operations` | table _time event_type node_id benchmark_id suite_id status scheduler scheduler_state attempt max_attempts lease_timeout_seconds retry_delay_seconds background_enabled tick_interval_seconds changed timed_out retried exhausted claimed completed failed no_job error_code | sort - _time
cron_schedule = */10 * * * *
disabled = 1

[Llama Wrangler - Routing Policy Exclusion Summary]
search = `llama_wrangler_routing` | spath path=excluded_nodes{} output=excluded_node | mvexpand excluded_node | spath input=excluded_node path=node_id output=excluded_node_id | spath input=excluded_node path=control_level output=control_level | spath input=excluded_node path=trust_level output=trust_level | spath input=excluded_node path=capability_source output=capability_source | spath input=excluded_node path=reasons{} output=reason_code | mvexpand reason_code | stats count as exclusions by reason_code excluded_node_id control_level trust_level capability_source | sort - exclusions
cron_schedule = */10 * * * *
disabled = 1

[Llama Wrangler - Model Lifecycle Action History]
search = `llama_wrangler_model_lifecycle_actions` | table _time event_type node_id control_level trust_level approval_state action_id action_type model desired_keep_warm status error_code reason_codes | sort - _time
cron_schedule = */10 * * * *
disabled = 1
