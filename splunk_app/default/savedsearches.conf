[Llama Wrangler - Endpoint Health Summary]
search = `llama_wrangler_health` | stats latest(status) as status latest(memory_available_gb) as memory_available_gb latest(active_jobs) as active_jobs latest(max_jobs) as max_jobs by node_id hostname platform arch
cron_schedule = */5 * * * *
disabled = 1

[Llama Wrangler - Model Performance Summary]
search = `llama_wrangler_responses` | stats count avg(latency_ms) as avg_latency_ms avg(tokens_per_second) as avg_tps perc95(latency_ms) as p95_latency_ms by selected_node resolved_model model_alias
cron_schedule = */10 * * * *
disabled = 1

[Llama Wrangler - Frontier Usage Summary]
search = `llama_wrangler_index` sourcetype=llama_wrangler:frontier_delta | stats count sum(estimated_cost_usd) as estimated_cost by provider frontier_model payload_type
cron_schedule = */15 * * * *
disabled = 1
