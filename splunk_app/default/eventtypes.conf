[llama_wrangler_requests]
search = index=llama_wrangler sourcetype=llama_wrangler:request

[llama_wrangler_responses]
search = index=llama_wrangler sourcetype=llama_wrangler:response

[llama_wrangler_errors]
search = index=llama_wrangler (sourcetype=llama_wrangler:error OR status=error)

[llama_wrangler_frontier]
search = index=llama_wrangler sourcetype=llama_wrangler:frontier_delta

[llama_wrangler_consensus]
search = index=llama_wrangler sourcetype=llama_wrangler:consensus

[llama_wrangler_queue]
search = index=llama_wrangler sourcetype=llama_wrangler:queue_state

[llama_wrangler_streaming_outcomes]
search = index=llama_wrangler (sourcetype=llama_wrangler:upstream_retry OR sourcetype=llama_wrangler:response_partial OR sourcetype=llama_wrangler:request_cancelled)

[llama_wrangler_benchmark_operations]
search = index=llama_wrangler (sourcetype=llama_wrangler:benchmark_job_claimed OR sourcetype=llama_wrangler:benchmark_job_status OR sourcetype=llama_wrangler:benchmark_scheduler_reconcile OR sourcetype=llama_wrangler:benchmark_scheduler_manual_reconcile OR sourcetype=llama_wrangler:benchmark_scheduler_background_tick OR sourcetype=llama_wrangler:benchmark_scheduler_policy_updated OR sourcetype=llama_wrangler:subscriber_benchmark_runner_tick)

[llama_wrangler_routing_policy]
search = index=llama_wrangler sourcetype=llama_wrangler:routing_decision

[llama_wrangler_model_lifecycle_actions]
search = index=llama_wrangler (sourcetype=llama_wrangler:model_lifecycle_action_queued OR sourcetype=llama_wrangler:model_lifecycle_action_claimed OR sourcetype=llama_wrangler:model_lifecycle_action_status OR sourcetype=llama_wrangler:model_lifecycle_action_rejected)
